<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Learning App</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header>
    <h1><i class="fas fa-language"></i> Language Learning App</h1>
    <p>Learn New Words Every Day</p>
</header>

<div class="container">

    <div class="stats">
        <div class="card">
            <h3>Words Learned</h3>
            <p id="learnedCount">0</p>
        </div>

        <div class="card">
            <h3>Quiz Score</h3>
            <p id="quizScore">0</p>
        </div>
    </div>

    <div class="categories">
        <button onclick="showCategory('vocabulary')">Vocabulary</button>
        <button onclick="showCategory('grammar')">Grammar</button>
        <button onclick="showCategory('phrases')">Phrases</button>
    </div>

    <div class="flashcard">
        <h2 id="word">Hola</h2>
        <p id="translation">Hello</p>

        <button onclick="speakWord()">
            <i class="fas fa-volume-up"></i> Pronounce
        </button>

        <button onclick="nextCard()">
            Next Card
        </button>

        <button onclick="markLearned()">
            Learned
        </button>
    </div>

    <div class="quiz-section">
        <h2>Quick Quiz</h2>

        <p id="question"></p>

        <div id="options"></div>

        <p id="result"></p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
